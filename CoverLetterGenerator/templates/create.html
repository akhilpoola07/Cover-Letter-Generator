<!DOCTYPE html>
<html>
<head>
    <title>Create Cover Letter</title>
</head>
<body>

    <h1>Create Cover Letter</h1>

    <form method="POST">

        <input type="text" name="full_name" placeholder="Full Name" required>
        <br><br>

        <input type="text" name="company_name" placeholder="Company Name" required>
        <br><br>

        <input type="text" name="role" placeholder="Job Role" required>
        <br><br>

        <textarea name="skills" placeholder="Skills" required></textarea>
        <br><br>

        <textarea name="experience" placeholder="Experience" required></textarea>
        <br><br>

        <button type="submit">Generate Cover Letter</button>

    </form>

</body>
</html>
