<!DOCTYPE html>
<html>
<head>
    <title>Edit Cover Letter</title>
</head>
<body>

    <h1>Edit Cover Letter</h1>

    <form method="POST">

        <input type="text" name="full_name" value="{{ letter.full_name }}" required>
        <br><br>

        <input type="text" name="company_name" value="{{ letter.company_name }}" required>
        <br><br>

        <input type="text" name="role" value="{{ letter.role }}" required>
        <br><br>

        <textarea name="skills" required>{{ letter.skills }}</textarea>
        <br><br>

        <textarea name="experience" required>{{ letter.experience }}</textarea>
        <br><br>

        <button type="submit">Update</button>

    </form>

</body>
</html>
